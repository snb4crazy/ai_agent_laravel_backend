name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-release:
    name: Verify release and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, sqlite, pdo_sqlite, dom, curl
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache/files
          key: ${{ runner.os }}-release-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style with Pint
        run: vendor/bin/pint --test

      - name: Run test suite
        run: composer test

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

